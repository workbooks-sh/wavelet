<!doctype html>
<html>
<head><style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    background: #0f1116;
  }
  #bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #label {
    position: absolute;
    left: 64px;
    bottom: 64px;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  #kicker {
    position: absolute;
    left: 64px;
    bottom: 156px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #94a3b8;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }
</style></head>
<body>
  <img id="bg" src="../assets/mountain.jpg" alt="" />
  <div id="kicker">scene A</div>
  <div id="label">Mountain</div>
</body>
</html>
