<!doctype html>
<html>
<head><style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
  body {
    background: #0f1116;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  #bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.55;
  }
  #scrim {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 17, 22, 0.45);
  }
  #headline {
    position: relative;
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.6);
  }
  #subhead {
    position: relative;
    font-size: 28px;
    color: #e2e8f0;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }
</style></head>
<body>
  <img id="bg" src="../assets/mountain.jpg" alt="" />
  <div id="scrim"></div>
  <div id="headline">wavelet v3</div>
  <div id="subhead">Pure-Rust motion graphics. No Chromium.</div>
</body>
</html>
