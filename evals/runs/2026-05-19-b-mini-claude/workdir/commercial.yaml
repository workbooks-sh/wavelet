name: commercial
version: "3.0.0"
description: >
  Path B v3 — the canonical reference-conditioned AI commercial pipeline
  from the gamut-director skill, codified as a declarative spec. Eight
  stages: research → script → velocity → storyboard → asset → edit →
  compose → publish. Each stage names the director skill it answers to,
  the gamut subcommands it may call, and the structural checks that
  must pass before the next stage begins.
  See vendor/workbooks/skills/gamut-director/SKILL.md for the long-form
  prose this pipeline derives from.

stages:
  - name: research
    description: >
      Pick a concept that fits the AI-commercial sweet spot (single
      product, no real-people lip-sync, no tight logo demands) and
      distill the 9-line ad-creative brief
      (PRODUCT / AUDIENCE / INSIGHT / PROMISE / PROOF / TONE / MUSIC /
      CALL / RUNTIME). Long-form prose briefs get distilled here —
      downstream stages assume slot-filled input.
    required_artifacts_out:
      - brief.md
    tools_available:
      - "brief check"
    success_criteria:
      - kind: artifact_exists
        params: { path: brief.md }
      - kind: brief_check_passes
        params: { path: brief.md }

  - name: script
    description: >
      Author the Fountain screenplay. 4–6 scenes, mostly action
      paragraphs; pacing matches the brief's MUSIC energy curve.
      Validated structurally before velocity gets to look at it.
    required_artifacts_in:
      - brief.md
    required_artifacts_out:
      - script.fountain
      - screenplay.json
    tools_available:
      - "screenplay parse"
    success_criteria:
      - kind: artifact_exists
        params: { path: script.fountain }
      - kind: screenplay_parse_clean

  - name: velocity
    description: >
      Propose a BPM curve from the screenplay and (once music exists)
      validate it against the track's detected BPM. The curve drives
      cut timing in the storyboard stage.
    required_artifacts_in:
      - screenplay.json
    required_artifacts_out:
      - velocity.json
    tools_available:
      - "velocity propose"
      - "velocity validate"
    success_criteria:
      - kind: artifact_exists
        params: { path: velocity.json }

  - name: storyboard
    description: >
      Plan the per-shot storyboard. Runs structural verify + 180°-rule
      / motion-vector continuity + Fountain transition classification.
      Must reach 0 errors on every gate before proceeding.
    required_artifacts_in:
      - screenplay.json
      - velocity.json
    required_artifacts_out:
      - storyboard.json
      - transitions.json
    tools_available:
      - "storyboard plan"
      - "storyboard verify"
      - "continuity check"
      - "transitions classify"
      - "director synthesize"
    success_criteria:
      - kind: artifact_exists
        params: { path: storyboard.json }
      - kind: storyboard_verify_passes
      - kind: continuity_check_zero_errors

  - name: asset
    description: >
      Generate the paid assets. Music first (so velocity can be
      validated against detected BPM), then refs + scene-stills + i2v
      shots in parallel — one Seedream still + one Kling/Wan/Veo i2v
      per scene. Cost-gated by --max-cost. Reviewer skill gates spend
      between every sub-step.
    required_artifacts_in:
      - storyboard.json
      - velocity.json
    required_artifacts_out:
      - music.wav
      - shots/
    tools_available:
      - "music gen"
      - "image scene-still"
      - "shot img2vid"
      - "shot txt2vid"
      - "shot refine-face"
      - "shot upscale"
    success_criteria:
      - kind: artifact_exists
        params: { path: music.wav }
      - kind: cost_below_usd
        params: { max: 5.0 }
      - kind: vlm_verify_passes_per_shot

  - name: edit
    description: >
      Assemble the rough cut. Snap shot boundaries to detected onsets,
      handle J/L-cuts and whip-pan transitions, generate the
      cuts.edl + word-level captions from the VO timestamps.
    required_artifacts_in:
      - shots/
      - music.wav
      - transitions.json
    required_artifacts_out:
      - cuts.edl
      - captions.json
    tools_available:
      - "query --on-beat"
      - "captions align"
      - "dialogue tts"
    success_criteria:
      - kind: artifact_exists
        params: { path: cuts.edl }

  - name: compose
    description: >
      Write per-scene HTML overlays (be creative — full HTML/CSS
      freedom, no template library), assemble comp.json that
      references every shot + caption + overlay, and verify before
      render. The verify gate catches structural problems before
      spending render time.
    required_artifacts_in:
      - cuts.edl
      - captions.json
    required_artifacts_out:
      - comp.json
    tools_available:
      - verify
      - "query"
    success_criteria:
      - kind: artifact_exists
        params: { path: comp.json }
      - kind: comp_verify_passes

  - name: publish
    description: >
      Render the comp to MP4, mux the sidecar WAV, and sign the result
      with a C2PA content-credentials manifest. Default flag uses the
      bundled test cert; production delivery requires a real ES256
      cert chain. EU AI Act Article 50 enforcement begins Aug 2026.
    required_artifacts_in:
      - comp.json
    required_artifacts_out:
      - commercial.mp4
    tools_available:
      - render
      - "c2pa sign"
      - "c2pa verify"
    success_criteria:
      - kind: artifact_exists
        params: { path: commercial.mp4 }
      - kind: c2pa_verify_passes
        params: { path: commercial.mp4 }

orchestration:
  budget_default_usd: 15.0
  max_revisions_per_stage: 3
  max_send_backs: 2
  max_wall_time_minutes: 90

reference_input:
  supported: false
  analysis_tools: []

tier_policy:
  draft:
    i2v: wan-2.1
    still: seedream
    music: elevenlabs-music
    tts: elevenlabs-tts
  hero:
    i2v: veo-3.1
    still: nano-banana-pro
    music: elevenlabs-music
    tts: elevenlabs-tts
    upscale: seedvr2-7b
