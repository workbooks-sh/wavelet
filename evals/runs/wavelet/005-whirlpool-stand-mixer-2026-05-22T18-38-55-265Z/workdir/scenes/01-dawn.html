<!doctype html>
<html><head><style>
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  body { font-family: "JetBrains Mono", ui-monospace, monospace; color: #fff; }

  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 55%, transparent 30%, #00000040 75%, #000000a0 100%);
    animation: vignette-in 1.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes vignette-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .hud-tag {
    position: absolute; top: 56px; left: 56px;
    font-size: 22px; letter-spacing: 0.36em; text-transform: uppercase;
    color: #ffffffcc;
    opacity: 0;
    animation: tag-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }
  @keyframes tag-in {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .hud-time {
    position: absolute; top: 56px; right: 56px;
    font-size: 22px; letter-spacing: 0.24em;
    color: #ffffff90;
    opacity: 0;
    animation: tag-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }
</style></head>
<body>
  <div class="vignette"></div>
  <div class="hud-tag">No. 01 — Dawn</div>
  <div class="hud-time">06 : 14</div>
</body></html>
