<!doctype html>
<html><head>
<style>
  :root {
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

  /* Heavy right-side scrim — pushes the editorial line off the dough cleanly */
  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(265deg, rgba(15, 8, 8, 0.85) 0%, rgba(15, 8, 8, 0.50) 35%, transparent 70%);
  }

  .line-wrap {
    position: absolute;
    right: 64px;
    top: 32%;
    max-width: 80vw;
    text-align: right;
    opacity: 0;
    animation: drift 1.6s var(--ease-out-quint) 0.22s both;
  }

  .line {
    margin: 0;
    font-family: "Bodoni Moda", "Didot", Didot, Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 104px;
    line-height: 1.0;
    color: #fff8ef;
    letter-spacing: -0.015em;
    text-shadow: 0 2px 22px rgba(0, 0, 0, 0.85);
  }
  .line .br { display: block; }
  .line .accent { color: #f3b6ac; }

  @keyframes drift {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style></head>
<body>
  <video class="bg" src="../shots/shot-2-dough.mp4" autoplay muted playsinline></video>
  <div class="scrim"></div>
  <div class="line-wrap">
    <p class="line">
      <span class="br">A ritual,</span>
      <span class="br"><span class="accent">not</span> a recipe.</span>
    </p>
  </div>
</body></html>
