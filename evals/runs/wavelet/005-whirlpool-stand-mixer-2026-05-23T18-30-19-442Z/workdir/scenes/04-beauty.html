<!doctype html>
<html><head>
<style>
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

  /* Bottom-anchored editorial tag — display weight, in safe zone, with scrim */
  .scrim {
    position: absolute; left: 0; right: 0; bottom: 0; height: 38vh;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.82) 100%);
    pointer-events: none;
  }

  .tag-wrap {
    position: absolute;
    left: 56px; right: 56px;
    bottom: 420px;
    color: #fff;
    opacity: 0;
    animation: in 1.0s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }

  .name {
    display: block;
    font-family: "Helvetica Neue", "Avenir Next", sans-serif;
    font-weight: 900;
    font-size: 140px;
    line-height: 0.88;
    letter-spacing: -0.04em;
    color: #ffffff;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.85);
  }
  .name .accent { color: #c61430; }

  .meta {
    display: block;
    margin-top: 26px;
    padding-top: 22px;
    border-top: 3px solid rgba(255, 255, 255, 0.65);
    font-family: "Avenir Next", "Avenir", "Helvetica Neue", sans-serif;
    font-weight: 700;
    font-size: 86px;
    line-height: 1;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.85);
  }

  @keyframes in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style></head>
<body>
  <video class="bg" src="../shots/shot-4-beauty.mp4" autoplay muted playsinline></video>
  <div class="scrim"></div>
  <div class="tag-wrap">
    <span class="name">ARTISAN<span class="accent">.</span></span>
    <span class="meta">Since 1937</span>
  </div>
</body></html>
