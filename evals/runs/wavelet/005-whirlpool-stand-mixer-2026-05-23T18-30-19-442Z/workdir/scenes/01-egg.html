<!doctype html>
<html><head>
<style>
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  body { font-family: "Helvetica Neue", "Avenir Next", "Avenir", sans-serif; color: #fff; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

  /* Strong bottom scrim — guarantees AA contrast for the kicker against any frame */
  .scrim {
    position: absolute; left: 0; right: 0; bottom: 0; height: 38vh;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.82) 100%);
    pointer-events: none;
  }

  .kicker-wrap {
    position: absolute;
    left: 56px; right: 56px;
    bottom: 420px;
    opacity: 0;
    animation: fade-up 1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both;
  }

  .kicker {
    display: inline-block;
    padding: 18px 28px;
    background: rgba(20, 14, 12, 0.78);
    border-left: 4px solid #c61430;
    font-weight: 700;
    font-size: 84px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: #ffffff;
  }
  .sub {
    display: block;
    margin-top: 18px;
    padding-left: 32px;
    font-weight: 500; font-size: 30px;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255, 255, 255, 0.96);
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.85);
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style></head>
<body>
  <video class="bg" src="../shots/shot-1-egg.mp4" autoplay muted playsinline></video>
  <div class="scrim"></div>
  <div class="kicker-wrap">
    <span class="kicker">Sunday morning.</span>
  </div>
</body></html>
