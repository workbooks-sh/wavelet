<!doctype html>
<html><head>
<style>
  :root {
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
    --kitchenaid-red: #c61430;
    --cream: #f5efe6;
    --charcoal: #2c2c2c;
  }

  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }

  .close {
    position: absolute; inset: 0;
    background: var(--cream);
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    place-items: center;
    padding: 8vh 0;
  }

  .wordmark-wrap {
    grid-row: 2;
    display: grid;
    place-items: center;
    gap: 36px;
    text-align: center;
    color: var(--charcoal);
  }

  .wordmark {
    width: 380px;
    height: auto;
    opacity: 0;
    transform: translateY(24px);
    animation: rise 1.0s var(--ease-out-quint) 0.15s forwards;
  }

  .strap {
    font-family: "Avenir Next", "Avenir", "Helvetica Neue", sans-serif;
    font-weight: 500;
    font-size: 92px;
    line-height: 1.06;
    letter-spacing: -0.015em;
    max-width: 12ch;
    color: var(--charcoal);
    opacity: 0;
    animation: rise 1.2s var(--ease-out-quint) 0.55s forwards;
  }
  .strap em {
    font-style: normal;
    color: var(--kitchenaid-red);
    font-weight: 600;
  }

  .since {
    font-family: "Avenir Next", "Avenir", "Helvetica Neue", sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--charcoal);
    padding-left: 0.42em;
    opacity: 0;
    animation: fade 1.4s ease-out 1.0s forwards;
  }

  .rule {
    display: inline-block;
    width: 56px; height: 2px;
    background: var(--kitchenaid-red);
    margin: 0 18px 6px;
    vertical-align: middle;
    transform: scaleX(0);
    transform-origin: center;
    animation: grow 0.9s var(--ease-out-expo) 0.85s forwards;
  }

  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { to { opacity: 1; } }
  @keyframes grow { to { transform: scaleX(1); } }
</style></head>
<body>
  <div class="close">
    <div class="wordmark-wrap">
      <img class="wordmark" src="../assets/kitchenaid-logo.png" alt="KitchenAid">
      <div class="strap">Bringing culinary inspiration to life <em>since 1919.</em></div>
      <div class="since"><span class="rule"></span>A Whirlpool brand<span class="rule"></span></div>
    </div>
  </div>
</body></html>
