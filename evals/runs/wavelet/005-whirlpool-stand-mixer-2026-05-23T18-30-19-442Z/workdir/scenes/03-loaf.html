<!doctype html>
<html><head>
<style>
  /* Editorial silence — no text. The loaf carries the beat.
     A barely-there vignette holds the eye on the loaf without competing. */
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 95% 75% at 50% 55%, transparent 50%, rgba(0,0,0,0.35) 100%);
    opacity: 0;
    animation: in 1.4s ease-out 0.1s forwards;
  }
  @keyframes in { to { opacity: 1; } }
</style></head>
<body>
  <video class="bg" src="../shots/shot-3-loaf.mp4" autoplay muted playsinline></video>
  <div class="vignette"></div>
</body></html>
