<!doctype html>
<html><head><style>
  :root {
    --red: #E0241B;
    --cream: #F4F0E8;
    --ink: #1A1614;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }

  .vignette {
    position:absolute; inset:0;
    background:
      radial-gradient(120% 80% at 50% 100%, rgba(26,22,20,0.55) 0%, rgba(26,22,20,0.0) 55%),
      radial-gradient(120% 80% at 50% 0%, rgba(26,22,20,0.30) 0%, rgba(26,22,20,0.0) 60%);
    pointer-events:none;
  }

  .eyebrow {
    position:absolute;
    left: 8vw; right: 8vw;
    bottom: 22vh;
    color: var(--cream);
    font: 600 14px/1.35 -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    opacity: 0;
    text-shadow: 0 2px 14px rgba(0,0,0,0.55);
    animation:
      rise 1.1s var(--ease-out-expo) 0.55s forwards,
      fadeOut 0.45s var(--ease-out-expo) 3.55s forwards;
  }

  .accent {
    position:absolute;
    left: 8vw;
    bottom: 19vh;
    width: 0; height: 2px;
    background: var(--red);
    box-shadow: 0 0 12px rgba(224,36,27,0.35);
    animation:
      draw 0.9s var(--ease-out-expo) 1.30s forwards,
      fadeOut 0.45s var(--ease-out-expo) 3.55s forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes draw {
    from { width: 0; }
    to   { width: 22vw; }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
</style></head>
<body>
  <div class="vignette"></div>
  <div class="eyebrow">For the ones who<br/>still make it by hand</div>
  <div class="accent"></div>
</body></html>
