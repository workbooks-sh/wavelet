<!doctype html>
<html><head>
<style>
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter:wght@800;900&display=swap");
  :root {
    --ease-out-circ:  cubic-bezier(0, 0.55, 0.45, 1);
    --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .stage {
    position: absolute; inset: 0;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    grid-template-columns: 1fr;
  }
  .numeral {
    grid-row: 1 / span 3;
    grid-column: 1;
    align-self: center; justify-self: center;
    font-family: "Inter", sans-serif;
    font-weight: 900;
    font-size: 78vw;
    line-height: 0.78;
    color: #ffffff;
    mix-blend-mode: difference;
    letter-spacing: -0.06em;
    margin: 0;
    transform: translateY(8vh);
    opacity: 0;
    animation: settle 1.4s var(--ease-out-expo) 0.1s forwards;
  }
  .caption {
    position: absolute;
    bottom: 7vh; left: 0; right: 0;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: #f5efe6;
    opacity: 0;
    animation: fade-in 1.2s var(--ease-out-circ) 1.0s forwards;
  }
  .caption .dot { color: #f5efe680; padding: 0 0.6em; }
  .ticker {
    position: absolute;
    top: 6vh; left: 0; right: 0;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: #f5efe6a0;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 1.4s var(--ease-out-expo) 0.5s forwards;
  }
  @keyframes settle {
    0%   { opacity: 0; transform: translateY(8vh) scale(1.06); letter-spacing: 0.1em; }
    100% { opacity: 1; transform: translateY(0)    scale(1);    letter-spacing: -0.06em; }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style></head>
<body>
  <div class="stage">
    <div class="ticker">— TEN SPEEDS · ONE GEARBOX —</div>
    <h1 class="numeral">10</h1>
    <div class="caption">Direct drive<span class="dot">·</span>Lifetime tested</div>
  </div>
</body></html>
