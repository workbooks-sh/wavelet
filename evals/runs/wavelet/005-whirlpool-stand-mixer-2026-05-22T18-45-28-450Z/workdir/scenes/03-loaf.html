<!doctype html>
<html><head>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap");
  :root {
    --ease-out-back:  cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, transparent 55%, #00000080 90%, #000000b0 100%);
    opacity: 0;
    animation: fade-in 1.4s var(--ease-out-quint) 0.1s forwards;
  }
  .end {
    position: absolute;
    left: 0; right: 0;
    bottom: 14vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.3em;
    color: #f5efe6;
  }
  .wordmark {
    font-family: "Inter", sans-serif;
    font-weight: 700;
    font-size: 56px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    padding-left: 0.42em;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1.4s var(--ease-out-expo) 0.5s forwards;
    text-shadow: 0 2px 24px #00000060;
  }
  .rule {
    width: 0;
    height: 1px;
    background: #f5efe6;
    opacity: 0.7;
    animation: line-grow 1.0s var(--ease-out-quint) 1.4s forwards;
  }
  .strap {
    font-family: "Inter", sans-serif;
    font-weight: 200;
    font-style: italic;
    font-size: 24px;
    letter-spacing: 0.06em;
    color: #f5efe6d0;
    opacity: 0;
    transform: translateY(12px);
    animation: rise 1.2s var(--ease-out-quint) 1.9s forwards;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes line-grow {
    from { width: 0; }
    to   { width: 28vw; }
  }
</style></head>
<body>
  <div class="scrim"></div>
  <div class="end">
    <div class="wordmark">Whirlpool</div>
    <div class="rule"></div>
    <div class="strap">Built to stay.</div>
  </div>
</body></html>
