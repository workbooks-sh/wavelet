<!doctype html>
<html><head><style>
  :root {
    --cream: #f6efe2;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&display=swap");
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }

  .knockout {
    position:absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 0 4vw;
    font: 700 24vw/0.86 "Playfair Display", serif;
    color: #fff;
    mix-blend-mode: difference;
    letter-spacing: -0.04em;
    text-align: center;
    margin: 0;
  }
  .knockout span {
    display: block;
    opacity: 0;
    transform: translateY(20px);
    animation: in 1.1s var(--ease-out-expo) forwards;
  }
  .knockout span:nth-child(1) { animation-delay: 0.25s; }
  .knockout span:nth-child(2) {
    animation-delay: 0.7s;
    font-style: italic;
    font-weight: 500;
  }

  @keyframes in {
    to { opacity: 1; transform: translateY(0); }
  }
</style></head>
<body>
  <h1 class="knockout">
    <span>Made</span>
    <span>here.</span>
  </h1>
</body></html>
