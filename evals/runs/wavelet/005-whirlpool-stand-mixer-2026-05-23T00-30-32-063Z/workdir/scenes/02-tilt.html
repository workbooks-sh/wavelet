<!doctype html>
<html><head><style>
  :root {
    --cream: #f6efe2;
    --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap");
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }

  .hud {
    position:absolute; inset:0;
    padding: 4vh 5vw;
    font-family: "JetBrains Mono", monospace;
    color: var(--cream);
  }
  .row {
    position:absolute;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 0.5s ease-out 0.2s forwards;
  }
  .tl { top: 5vh; left: 6vw; }
  .br { bottom: 6vh; right: 6vw; text-align: right; }
  .key { opacity: 0.55; }

  .specs {
    position:absolute;
    right: 6vw; top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 1.6vh;
    text-align: right;
  }
  .specs .num {
    font-family: "JetBrains Mono", monospace;
    font-size: 9vw;
    font-weight: 500;
    color: var(--cream);
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px rgba(0,0,0,0.4);
  }
  .specs .lab {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-top: 4px;
  }
  .specs > div {
    opacity: 0;
    animation: stat-in 0.6s var(--ease-out-back) forwards;
  }
  .specs > div:nth-child(1) { animation-delay: 0.35s; }
  .specs > div:nth-child(2) { animation-delay: 0.7s; }
  .specs > div:nth-child(3) { animation-delay: 1.05s; }

  @keyframes fade-in { to { opacity: 1; } }
  @keyframes stat-in {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style></head>
<body>
  <div class="hud">
    <div class="row tl"><span class="key">MODEL</span> &nbsp;Artisan&nbsp;&nbsp;<span class="key">FINISH</span> Empire Red</div>
    <div class="row br">Engineered in Greenville, Ohio</div>
    <div class="specs">
      <div><div class="num">11</div><div class="lab">speeds</div></div>
      <div><div class="num">325W</div><div class="lab">motor</div></div>
      <div><div class="num">5qt</div><div class="lab">bowl</div></div>
    </div>
  </div>
</body></html>
