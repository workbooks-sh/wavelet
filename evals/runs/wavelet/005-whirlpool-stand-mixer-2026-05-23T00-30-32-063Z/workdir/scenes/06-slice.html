<!doctype html>
<html><head><style>
  :root {
    --cream: #f6efe2;
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
  }
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@200;700&display=swap");
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }

  .pour {
    position:absolute;
    left:0; right:0; bottom:0;
    padding: 5vh 6vw 6vh;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.75) 100%);
    color: var(--cream);
    font-family: "Inter", sans-serif;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2vw;
    align-items: end;
    opacity: 0;
    transform: translateY(6vh);
    animation: rise 1.0s var(--ease-out-quint) 0.15s forwards;
  }
  .strap {
    font-weight: 200;
    font-size: 4.4vw;
    line-height: 1.18;
    letter-spacing: -0.005em;
    max-width: 26ch;
  }
  .strap b {
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .stamp {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.75;
    text-align: right;
    line-height: 1.6;
    align-self: end;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
</style></head>
<body>
  <div class="pour">
    <div class="strap">
      Built once.<br>
      <b>Loved for a lifetime.</b>
    </div>
    <div class="stamp">
      Est.<br>1919
    </div>
  </div>
</body></html>
