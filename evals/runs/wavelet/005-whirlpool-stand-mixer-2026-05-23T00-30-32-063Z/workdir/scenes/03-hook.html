<!doctype html>
<html><head><style>
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }
  .vignette {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.32) 82%, rgba(0,0,0,0.6) 100%);
    opacity: 0;
    animation: in 1.6s ease-out 0.1s forwards;
  }
  @keyframes in { to { opacity: 1; } }
</style></head>
<body>
  <div class="vignette"></div>
</body></html>
