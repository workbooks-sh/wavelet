<!doctype html>
<html><head><style>
  :root {
    --red: #c61430;
    --ink: #2c2c2c;
    --cream: #f6efe2;
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out-back:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Inter:wght@300;500;700&display=swap");
  html, body { margin:0; padding:0; background: transparent; width:100%; height:100%; overflow:hidden; }

  .cta {
    position:absolute; inset:0;
    background: var(--cream);
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    place-items: center;
    padding: 8vh 7vw;
    font-family: "Inter", sans-serif;
    color: var(--ink);
  }

  .ribbon {
    position:absolute;
    top: 0; left: 0; right: 0;
    height: 6vh;
    background: var(--red);
    transform: translateY(-100%);
    animation: drop 0.7s var(--ease-out-quint) 0.05s forwards;
  }
  .ribbon-b {
    position:absolute;
    bottom: 0; left: 0; right: 0;
    height: 6vh;
    background: var(--red);
    transform: translateY(100%);
    animation: drop-up 0.7s var(--ease-out-quint) 0.05s forwards;
  }

  .mark {
    grid-row: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4vh;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1.0s var(--ease-out-quint) 0.45s forwards;
  }

  .wordmark {
    width: 64vw;
    height: auto;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.04));
  }

  .tag {
    font-family: "Playfair Display", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 7.5vw;
    line-height: 1.05;
    text-align: center;
    color: var(--ink);
    letter-spacing: -0.015em;
    margin: 0;
  }
  .tag em { color: var(--red); font-style: italic; }

  .button-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 2vh;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1.0s var(--ease-out-back) 0.85s forwards;
  }
  .btn {
    background: var(--red);
    color: var(--cream);
    border: 0;
    padding: 2.6vh 7vw;
    font: 700 18px/1 "Inter", sans-serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(198, 20, 48, 0.35);
    cursor: pointer;
  }
  .url {
    font: 300 16px/1 "Inter", sans-serif;
    color: var(--ink);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.75;
  }

  @keyframes drop    { to { transform: translateY(0); } }
  @keyframes drop-up { to { transform: translateY(0); } }
  @keyframes rise    { to { opacity: 1; transform: translateY(0); } }
</style></head>
<body>
  <div class="cta">
    <div class="ribbon"></div>
    <div class="mark">
      <img class="wordmark" src="../assets-wordmark.png" alt="KitchenAid">
      <h2 class="tag">Shop <em>the icon.</em></h2>
    </div>
    <div class="button-wrap">
      <button class="btn">Shop now</button>
      <div class="url">kitchenaid.com</div>
    </div>
    <div class="ribbon-b"></div>
  </div>
</body></html>
