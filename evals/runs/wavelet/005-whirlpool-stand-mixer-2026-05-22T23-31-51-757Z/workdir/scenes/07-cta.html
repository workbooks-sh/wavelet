<!doctype html>
<html><head>
<style>
  :root {
    --ease-out-back:  cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    --cream: #f5efe6;
    --ink: #1c1410;
    --terracotta: #b04a2a;
  }
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .frame {
    position: absolute; inset: 0;
    display: grid;
    grid-template-rows: 1fr auto auto 1fr;
    padding: 8vh 8vw;
    align-items: center; justify-items: center;
    text-align: center;
    background: linear-gradient(180deg, rgba(245,239,230,0.0) 0%, rgba(245,239,230,0.0) 35%, rgba(28,20,16,0.55) 100%);
  }
  .wordmark {
    grid-row: 2;
    font-family: "Cormorant Garamond", "Didot", serif;
    font-weight: 600;
    font-size: 78px;
    letter-spacing: 0.08em;
    color: var(--cream);
    text-transform: uppercase;
    margin: 0 0 10px;
    text-shadow: 0 2px 22px rgba(0,0,0,0.35);
  }
  .rule {
    grid-row: 2;
    align-self: end;
    width: 64px; height: 1.5px;
    background: var(--cream);
    transform: translateY(8px);
    opacity: 0.85;
  }
  .tagline {
    grid-row: 3;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.92;
    margin-top: 28px;
  }
  .cta {
    grid-row: 3;
    align-self: end;
    margin-top: 64px;
    background: var(--terracotta);
    color: var(--cream);
    font-family: "Inter", sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 18px 32px;
    border-radius: 999px;
    box-shadow: 0 14px 38px rgba(28,20,16,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .url {
    grid-row: 4;
    align-self: end;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.7;
    margin-bottom: 8px;
  }

  @keyframes letter-in {
    from { letter-spacing: 0.2em; opacity: 0; }
    to   { letter-spacing: 0.08em; opacity: 1; }
  }
  .wordmark { animation: letter-in 1.2s var(--ease-out-quint) 0.05s both; }

  @keyframes grow-rule {
    from { width: 0;    opacity: 0; }
    to   { width: 64px; opacity: 0.85; }
  }
  .rule { animation: grow-rule 0.9s var(--ease-out-quint) 0.6s both; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tagline { animation: fade-up 0.9s var(--ease-out-quint) 0.85s both; }
  .url     { animation: fade-up 0.9s var(--ease-out-quint) 1.45s both; opacity: 0.7; }

  @keyframes pop-in {
    0%   { opacity: 0; transform: translateY(20px) scale(0.96); }
    65%  { opacity: 1; transform: translateY(-2px) scale(1.02); }
    100% { opacity: 1; transform: translateY(0)   scale(1);    }
  }
  .cta { animation: pop-in 0.8s var(--ease-out-back) 1.1s both; }
</style></head>
<body>
  <div class="frame">
    <div></div>
    <h1 class="wordmark">Whirlpool</h1>
    <div class="rule"></div>
    <div class="tagline">The iconic stand mixer</div>
    <div class="cta">Shop now</div>
    <div class="url">whirlpool.com / mixer</div>
  </div>
</body></html>
