<!doctype html>
<html><head>
<style>
:root {
  --kred:   #c61430;
  --kink:   #d48494;
  --kdark:  #2c2c2c;
  --kcream: #fdf6e8;
  --ease-out-back:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
}
html, body { margin: 0; padding: 0; background: transparent; width: 1080px; height: 1920px; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

.bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 28%, #fff 0%, #fdf6e8 38%, #f4e0c2 78%, #e9c896 100%);
}
.grain {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(60,30,10,0.18) 100%);
  mix-blend-mode: multiply;
  opacity: 0.65;
}
.frame {
  position: absolute; inset: 0;
  display: grid; grid-template-rows: 1fr auto auto auto auto 1fr;
  padding: 220px 100px 320px;
  gap: 28px;
  text-align: center;
  color: var(--kdark);
  justify-items: center;
  align-items: center;
}
.brandbar {
  display: flex; align-items: center; gap: 16px;
  font-weight: 800; letter-spacing: 0.38em; text-transform: uppercase; font-size: 22px;
  color: var(--kred);
}
.brandbar .dot { width: 10px; height: 10px; background: var(--kred); border-radius: 999px; }
.logo {
  width: 320px; height: 320px;
  display: grid; place-items: center;
  background: var(--kdark);
  border-radius: 999px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.18);
  padding: 64px;
}
.logo img { width: 100%; height: 100%; object-fit: contain; display: block; filter: brightness(0) invert(1); }
.tagline {
  font-weight: 800;
  font-size: 72px;
  line-height: 1.0;
  letter-spacing: -0.02em;
  max-width: 80%;
  color: var(--kdark);
}
.tagline .red { color: var(--kred); font-style: italic; font-weight: 700; }
.sub {
  font-weight: 500;
  font-size: 28px;
  letter-spacing: 0.06em;
  color: #4a3a2a;
  max-width: 80%;
}
.cta-row { display: flex; flex-direction: column; align-items: center; gap: 22px; margin-top: 8px; }
button.primary {
  background: var(--kred);
  color: #fff;
  font-family: inherit;
  font-weight: 800;
  font-size: 36px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 32px 60px;
  border: 0;
  border-radius: 999px;
  box-shadow: 0 18px 40px rgba(198, 20, 48, 0.42), 0 4px 0 rgba(80,4,16,0.18);
  cursor: pointer;
}
.url {
  font-size: 28px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--kdark); font-weight: 700;
}
.footer {
  position: absolute; left: 0; right: 0; bottom: 90px;
  text-align: center;
  font-size: 20px; letter-spacing: 0.35em; text-transform: uppercase;
  color: #6a5236; font-weight: 600;
}
@keyframes pop-in {
  0%   { transform: scale(0.7); opacity: 0; }
  60%  { transform: scale(1.04); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes drift {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes wipe {
  from { clip-path: inset(0 100% 0 0); }
  to   { clip-path: inset(0 0 0 0); }
}
.brandbar { animation: drift 0.5s var(--ease-out-quint) 0.05s both; }
.logo     { animation: pop-in 0.65s var(--ease-out-back) 0.10s both; }
.tagline  { animation: drift 0.7s var(--ease-out-expo) 0.30s both; }
.sub      { animation: drift 0.7s var(--ease-out-expo) 0.45s both; }
.cta-row  { animation: drift 0.7s var(--ease-out-expo) 0.55s both; }
.footer   { animation: wipe 0.9s var(--ease-out-expo) 0.7s both; }
</style></head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="frame">
    <div></div>
    <div class="brandbar"><span class="dot"></span><span>EST. 1919</span><span class="dot"></span></div>
    <div class="logo"><img src="kitchenaid-logo.png" alt=""></div>
    <h2 class="tagline">The icon.<br><span class="red">For your kitchen.</span></h2>
    <div class="sub">Made for generations, made for now.</div>
    <div class="cta-row">
      <button class="primary">Shop the Stand Mixer</button>
      <div class="url">kitchenaid.com</div>
    </div>
    <div></div>
  </div>
  <div class="footer">A WHIRLPOOL CORPORATION BRAND</div>
</body></html>
