<!doctype html>
<html><head>
<style>
:root {
  --ease-out-back:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
}
html, body { margin: 0; padding: 0; background: transparent; width: 1080px; height: 1920px; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #fff; }
.stage { position: absolute; inset: 0; display: grid; place-items: center; }
.number {
  position: absolute;
  top: 12%;
  font-weight: 900;
  font-size: 580px;
  line-height: 0.8;
  letter-spacing: -0.06em;
  color: #ffffff;
  mix-blend-mode: difference;
  margin: 0;
}
.units {
  position: absolute;
  right: 60px; top: 50%;
  font-size: 24px;
  letter-spacing: 0.42em; text-transform: uppercase;
  line-height: 2;
  text-align: right;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.65);
}
.units b { font-weight: 800; }
.callout {
  position: absolute;
  left: 60px; bottom: 320px;
  width: 60%;
  font-size: 36px;
  line-height: 1.3;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,0.75);
}
.callout em { color: #f3c89a; font-style: normal; }
@keyframes ramp {
  0%   { transform: translateY(36px) scale(0.94); opacity: 0; letter-spacing: 0.08em; }
  60%  { transform: translateY(-4px) scale(1.02); opacity: 1; letter-spacing: -0.06em; }
  100% { transform: translateY(0)     scale(1);    opacity: 1; letter-spacing: -0.06em; }
}
@keyframes slide-in-right { from { opacity: 0; transform: translateX(36px); } to { opacity: 1; transform: translateX(0); } }
@keyframes rise           { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
.number  { animation: ramp 1.0s var(--ease-out-back) 0s both; }
.units   { animation: slide-in-right 0.8s var(--ease-out-expo) 0.35s both; }
.callout { animation: rise 0.9s var(--ease-out-expo) 0.55s both; }
</style></head>
<body>
  <div class="stage">
    <h1 class="number">5</h1>
    <div class="units">QUART<br><b>BOWL</b><br>·<br>10 SPEEDS</div>
    <div class="callout">A spiral hook for <em>real bread</em>. A century of dough behind it.</div>
  </div>
</body></html>
