<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, #1a120e 0%, #06040a 80%);
    font-family: 'Helvetica Neue', Arial, sans-serif; color: #f4ece0; }
  .vignette { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%); }
  .col-title { position: absolute; left: 50%; top: 12%;
    transform: translateX(-50%);
    font-size: 32px; letter-spacing: 0.55em; color: #c9b89b;
    opacity: 0; animation: fade-in 0.9s ease 0.1s forwards; }
  .row { position: absolute; left: 0; right: 0; top: 24%;
    display: flex; justify-content: center; gap: 36px; }
  .swatch { width: 270px; height: 400px;
    border-radius: 24px;
    background: #1a1310;
    overflow: hidden;
    position: relative;
    opacity: 0;
    transform: translateY(40px);
    animation: card-in 0.9s cubic-bezier(.2,.7,.2,1) forwards; }
  .swatch:nth-child(1) { animation-delay: 0.10s; }
  .swatch:nth-child(2) { animation-delay: 0.28s; }
  .swatch:nth-child(3) { animation-delay: 0.46s; }
  @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
  .tile { position: absolute; left: 8%; right: 8%; top: 8%; height: 60%;
    border-radius: 16px; }
  .name { position: absolute; left: 0; right: 0; bottom: 18%;
    text-align: center; color: #ece0c6; letter-spacing: 0.32em;
    font-size: 18px; }
  .meta { position: absolute; left: 0; right: 0; bottom: 8%;
    text-align: center; color: #8c7e63; letter-spacing: 0.36em;
    font-size: 12px; }
  .tile-cream  { background: linear-gradient(135deg, #ffffff 0%, #f0e1bf 60%, #c9b58e 100%); }
  .tile-empire { background: linear-gradient(135deg, #ff6a4a 0%, #c5232a 60%, #6c0d13 100%); }
  .tile-mid    { background: linear-gradient(135deg, #c0c2c8 0%, #4a525e 60%, #1d2027 100%); }
  .footer { position: absolute; left: 50%; bottom: 10%;
    transform: translateX(-50%);
    font-size: 22px; letter-spacing: 0.45em; color: #c9b89b;
    opacity: 0; animation: fade-in 0.9s ease 0.9s forwards; white-space: nowrap; }
  @keyframes fade-in { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="vignette"></div>
  <div class="col-title">THREE FINISHES</div>
  <div class="row">
    <div class="swatch">
      <div class="tile tile-cream"></div>
      <div class="name">PORCELAIN</div>
      <div class="meta">MATTE</div>
    </div>
    <div class="swatch">
      <div class="tile tile-empire"></div>
      <div class="name">EMPIRE RED</div>
      <div class="meta">GLOSS</div>
    </div>
    <div class="swatch">
      <div class="tile tile-mid"></div>
      <div class="name">MIDNIGHT</div>
      <div class="meta">BRUSHED</div>
    </div>
  </div>
  <div class="footer">CHOOSE THE ONE THAT STAYS</div>
</body>
</html>
