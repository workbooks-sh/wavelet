<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 38%, #2a1a14 0%, #0a0605 70%);
    font-family: 'Helvetica Neue', Arial, sans-serif; color: #f4ece0; }
  .brand { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    text-align: center; }
  .wordmark { font-size: 132px; letter-spacing: 0.32em; font-weight: 300;
    color: #f7eedf;
    animation: word-in 1.4s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes word-in {
    0%   { opacity: 0; transform: scale(0.97); }
    100% { opacity: 1; transform: scale(1); }
  }
  .underline { width: 0; height: 1px; background: #c9b89b; margin: 28px auto 0;
    animation: line-in 1.2s ease .7s forwards; }
  @keyframes line-in { to { width: 320px; } }
  .sub { margin-top: 28px; font-size: 30px; letter-spacing: 0.55em; color: #c9b89b;
    opacity: 0; animation: sub-in 0.9s ease 1.0s forwards; }
  @keyframes sub-in { to { opacity: 1; } }
  .vignette { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.65) 100%); }
</style>
</head>
<body>
  <div class="vignette"></div>
  <div class="brand">
    <div class="wordmark">WHIRLPOOL</div>
    <div class="underline"></div>
    <div class="sub">EST. 1911</div>
  </div>
</body>
</html>
