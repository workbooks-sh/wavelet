<!doctype html>
<html><head>
<style>
  html, body { margin: 0; padding: 0; background: #111; width: 100%; height: 100%; overflow: hidden; font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; color: #fff; }

  .stage { position: absolute; inset: 0; }

  .bg {
    position: absolute; inset: 0;
    background: url("../refs/character/dana-face.jpg") center/cover no-repeat;
  }

  .scrim {
    position: absolute; left: 0; right: 0; bottom: 0; height: 45%;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.45) 100%);
  }

  /* CTA card sits lower-third. Animates in late so the dialogue lands first. */
  .cta {
    position: absolute;
    left: 6%;
    right: 6%;
    bottom: 13%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: cta-in 0.6s ease-out 4.4s forwards;
  }

  .eyebrow {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    padding-left: 0.5em;
  }

  .button {
    background: rgba(255,255,255,0.96);
    color: #0c1320;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.005em;
    padding: 18px 34px;
    border-radius: 999px;
    display: inline-flex; align-items: center; gap: 10px;
  }

  .button .arrow {
    display: inline-block;
    font-weight: 800;
  }

  @keyframes cta-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style></head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="scrim"></div>
    <div class="cta">
      <div class="eyebrow">try it for yourself</div>
      <div class="button">dewdropserum.com <span class="arrow">&rarr;</span></div>
    </div>
  </div>
</body></html>
