<!doctype html>
<html><head>
<style>
  /* Editorial silence: zero text on the ECU hands shot per brief.
     A very subtle radial vignette to settle the eye toward the dropper. */
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 55%, transparent 45%, rgba(0,0,0,0.18) 85%, rgba(0,0,0,0.32) 100%);
    opacity: 0;
    animation: settle 1.4s ease-out 0.2s forwards;
  }
  @keyframes settle {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style></head>
<body>
  <div class="vignette"></div>
</body></html>
