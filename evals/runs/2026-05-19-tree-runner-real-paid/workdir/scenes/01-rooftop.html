<!doctype html>
<html><head>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&display=swap");

  :root {
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }

  #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #00000055 0%, transparent 35%, transparent 70%, #000000aa 100%);
  }

  .frame {
    position: absolute; inset: 0;
    padding: 9vh 10vw;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
  }

  .moment {
    grid-row: 2;
    max-width: 56%;
    font-family: "Bodoni Moda", "Didot", serif;
    font-weight: 400;
    font-size: 6.4vw;
    line-height: 1.02;
    color: #f6ece0;
    letter-spacing: -0.005em;
  }
  .moment em {
    font-style: italic;
    font-weight: 400;
    color: #f6ece0;
  }

  .kicker {
    grid-row: 3;
    align-self: end;
    justify-self: end;
    font-family: "Bodoni Moda", serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #f6ece0c8;
    max-width: 22ch;
    text-align: right;
  }

  @keyframes drift-up {
    from { transform: translateY(28px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .moment { animation: drift-up 1.4s var(--ease-out-quint) 0.15s both; }
  .kicker { animation: drift-up 1.6s var(--ease-out-quint) 0.55s both; }
</style></head>
<body>
  <video id="bg" src="../shots/shot-1-rooftop.mp4" muted></video>
  <div class="scrim"></div>
  <div class="frame">
    <div class="moment">A place, <em>not</em><br>a product.</div>
    <div class="kicker">Marrakech Intense — Eau de Toilette</div>
  </div>
</body></html>
