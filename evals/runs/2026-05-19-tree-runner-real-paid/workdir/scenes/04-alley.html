<!doctype html>
<html><head>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@200;500&display=swap");

  :root {
    --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; font-family: "Inter", sans-serif; }

  #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* Soft round vignette to push the eye to the doorway */
  .vignette {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 58%, transparent 35%, #00000055 75%, #000000aa 100%);
  }

  .lockup {
    position: absolute;
    left: 50%;
    bottom: 11vh;
    transform: translateX(-50%);
    text-align: center;
    color: #f6ece0;
    width: max-content;
  }

  .whisper {
    font-weight: 200;
    font-size: 24px;
    letter-spacing: 0.55em;
    padding-left: 0.55em;
    text-transform: uppercase;
    color: #f6ece0d0;
  }

  .cta {
    margin-top: 1.1em;
    display: inline-block;
    border: 1px solid #f6ece0a0;
    border-radius: 999px;
    padding: 0.65em 1.6em;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #f6ece0;
  }

  /* Eyebrow seal — clip-path tag */
  .seal {
    position: absolute;
    top: 8vh;
    left: 50%;
    transform: translateX(-50%);
    padding: 0.4em 1.2em 0.4em 1.5em;
    background: #1a0d05cc;
    color: #f6ece0;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%, 16px 50%);
  }

  @keyframes whisper-in {
    from { opacity: 0; letter-spacing: 0.2em; }
    to   { opacity: 1; letter-spacing: 0.55em; }
  }
  .whisper { animation: whisper-in 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }

  @keyframes pop-cta {
    from { opacity: 0; transform: scale(0.84); }
    to   { opacity: 1; transform: scale(1); }
  }
  .cta { animation: pop-cta 0.7s var(--ease-out-back) 1.0s both; }

  @keyframes seal-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .seal { animation: seal-in 1.0s var(--ease-out-back) 0.05s both; }
</style></head>
<body>
  <video id="bg" src="../shots/shot-4-alley.mp4" muted></video>
  <div class="vignette"></div>
  <div class="seal">Aesop · est 1987</div>
  <div class="lockup">
    <div class="whisper">Find it on aesop.com</div>
    <div class="cta">Marrakech Intense</div>
  </div>
</body></html>
