<!doctype html>
<html><head>
<style>
  :root {
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

  #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  .stage {
    position: absolute; inset: 0;
    display: grid;
    place-items: center;
    padding: 4vh 4vw;
  }

  .knockout {
    font-weight: 900;
    font-size: 16vw;
    line-height: 0.9;
    color: #ffffff;
    mix-blend-mode: difference;
    text-align: center;
    margin: 0;
    letter-spacing: -0.04em;
  }
  .knockout small {
    display: block;
    font-weight: 400;
    font-size: 1.4vw;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-top: 0.4em;
  }

  @keyframes settle {
    0%   { letter-spacing: 0.18em;  opacity: 0; transform: scale(1.04); }
    100% { letter-spacing: -0.04em; opacity: 1; transform: scale(1); }
  }
  .knockout { animation: settle 1.3s var(--ease-out-expo) both; }

  @keyframes tag-rise {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .knockout small { animation: tag-rise 1.6s var(--ease-out-expo) 0.55s both; }
</style></head>
<body>
  <video id="bg" src="../shots/shot-3-tannery.mp4" muted></video>
  <div class="stage">
    <h1 class="knockout">MARRAKECH<small>+ leather + warmth</small></h1>
  </div>
</body></html>
