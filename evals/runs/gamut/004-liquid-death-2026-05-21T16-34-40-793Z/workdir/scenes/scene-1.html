<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: relative; font-family: "Acumin Pro", "Inter", sans-serif; color: #fff; }
  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .vhs-scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 2px, transparent 3px);
    mix-blend-mode: multiply;
  }
  .vhs-chroma {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(90deg, rgba(255,0,80,0.04) 0%, transparent 50%, rgba(0,200,255,0.04) 100%);
    mix-blend-mode: screen;
  }
  .vhs-grain {
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.025), transparent 60%),
                      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.02), transparent 60%);
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 100%);
  }
  .tape-stamp {
    position: absolute; top: 36px; left: 36px;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 20px; font-weight: 700;
    color: #e7e7e7; letter-spacing: 0.12em;
    text-shadow: 0 0 2px rgba(0,0,0,0.9);
    opacity: 0.78;
  }
  .tape-stamp .rec { color: #d23; }
</style>
</head>
<body>
  <video src="../shots/shot-1.mp4" autoplay muted playsinline></video>
  <div class="vhs-chroma"></div>
  <div class="vhs-scanlines"></div>
  <div class="vhs-grain"></div>
  <div class="vignette"></div>
  <div class="tape-stamp"><span class="rec">●</span> REC &nbsp; SP &nbsp; LP-007</div>
</body>
</html>
