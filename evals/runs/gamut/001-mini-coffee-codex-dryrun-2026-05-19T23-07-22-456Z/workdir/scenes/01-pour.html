<!doctype html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #16120f;
    color: #f4eee4;
    font-family: Georgia, "Times New Roman", serif;
  }

  .window {
    position: absolute;
    left: 44px;
    top: 0;
    width: 210px;
    height: 360px;
    background: linear-gradient(90deg, rgba(244, 232, 205, 0.28), rgba(244, 232, 205, 0));
  }

  .table {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 98px;
    background: #2b2119;
  }

  .shadow {
    position: absolute;
    left: 238px;
    top: 250px;
    width: 180px;
    height: 18px;
    background: rgba(0, 0, 0, 0.34);
    border-radius: 50%;
  }

  .carafe {
    position: absolute;
    left: 279px;
    top: 113px;
    width: 82px;
    height: 120px;
    background: #eee8dc;
    border-radius: 4px 4px 22px 22px;
    box-shadow: inset -14px 0 0 rgba(180, 168, 150, 0.32);
  }

  .neck {
    position: absolute;
    left: 300px;
    top: 94px;
    width: 40px;
    height: 31px;
    background: #f5f1e8;
    border-radius: 5px 5px 2px 2px;
  }

  .coffee {
    position: absolute;
    left: 296px;
    top: 151px;
    width: 50px;
    height: 54px;
    background: linear-gradient(#5a3523, #2f1a12);
    border-radius: 0 0 15px 15px;
    animation: settle 5s ease-in-out both;
  }

  .dripper {
    position: absolute;
    left: 271px;
    top: 64px;
    width: 96px;
    height: 48px;
    background: #d8d0c2;
    clip-path: polygon(8% 0, 92% 0, 68% 100%, 32% 100%);
    box-shadow: inset -10px 0 0 rgba(120, 108, 93, 0.18);
  }

  .stream {
    position: absolute;
    left: 319px;
    top: 24px;
    width: 3px;
    height: 82px;
    background: linear-gradient(#e9d8b8, #b79568);
    opacity: 0.84;
    animation: pour 5s ease-in-out infinite;
  }

  .steam {
    position: absolute;
    left: 291px;
    top: 37px;
    width: 60px;
    height: 52px;
    border: 2px solid rgba(244, 238, 228, 0.35);
    border-left: 0;
    border-bottom: 0;
    border-radius: 50%;
    animation: breathe 5s ease-in-out infinite;
  }

  .copy {
    position: absolute;
    right: 42px;
    bottom: 34px;
    text-align: right;
  }

  .line {
    font: 10px/1.55 Optima, "Avenir Next", Arial, sans-serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    opacity: 0.74;
  }

  h1 {
    margin: 9px 0 0;
    font-weight: 400;
    font-size: 34px;
    line-height: 0.95;
    letter-spacing: 0;
  }

  @keyframes pour {
    0%, 100% { transform: translateX(-1px); opacity: 0.70; }
    48% { transform: translateX(2px); opacity: 0.94; }
  }

  @keyframes breathe {
    0% { transform: translateY(10px) scale(0.86); opacity: 0.10; }
    45% { transform: translateY(-7px) scale(1.05); opacity: 0.36; }
    100% { transform: translateY(-18px) scale(1.16); opacity: 0.03; }
  }

  @keyframes settle {
    from { transform: translateY(6px); opacity: 0.82; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="window"></div>
  <div class="table"></div>
  <div class="shadow"></div>
  <div class="stream"></div>
  <div class="steam"></div>
  <div class="dripper"></div>
  <div class="neck"></div>
  <div class="carafe"></div>
  <div class="coffee"></div>
  <div class="copy">
    <div class="line">hand-poured<br>hand-watched</div>
    <h1>Pour<br>better</h1>
  </div>
</body>
</html>
