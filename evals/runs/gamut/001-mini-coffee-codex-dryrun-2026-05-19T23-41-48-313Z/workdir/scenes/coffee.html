<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #17130f;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }
    .frame {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 26% 18%, rgba(255, 224, 172, 0.35), transparent 36%),
        linear-gradient(110deg, #2a2118 0%, #17130f 46%, #080706 100%);
      filter: saturate(0.88) contrast(1.04);
    }
    .counter {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 31%;
      background: linear-gradient(180deg, #5b4938, #32261c);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }
    .cloth {
      position: absolute;
      left: 27%;
      bottom: 17%;
      width: 46%;
      height: 22%;
      background: #d8c7af;
      opacity: 0.72;
      transform: skewX(-8deg);
      clip-path: polygon(7% 0, 100% 8%, 92% 100%, 0 86%);
    }
    .carafe {
      position: absolute;
      left: 41%;
      bottom: 28%;
      width: 18%;
      height: 38%;
      border-radius: 45% 45% 28% 28%;
      background: linear-gradient(110deg, #f0e6d9 0%, #b9aa99 50%, #6f6256 100%);
      box-shadow: 0 22px 45px rgba(0,0,0,0.45), inset 16px 0 22px rgba(255,255,255,0.24);
      animation: breathe 5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .carafe:before {
      content: "";
      position: absolute;
      left: 24%;
      top: -18%;
      width: 52%;
      height: 28%;
      border-radius: 50% 50% 20% 20%;
      background: linear-gradient(90deg, #eee1d0, #8d7b68);
      box-shadow: inset 0 -6px 10px rgba(0,0,0,0.28);
    }
    .carafe:after {
      content: "";
      position: absolute;
      right: -24%;
      top: 24%;
      width: 28%;
      height: 34%;
      border: 10px solid rgba(216, 202, 184, 0.82);
      border-left: 0;
      border-radius: 0 50% 50% 0;
    }
    .pour {
      position: absolute;
      left: 50%;
      top: 6%;
      width: 3px;
      height: 44%;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(230,215,193,0.95), rgba(230,215,193,0.18));
      transform: rotate(7deg);
      transform-origin: top;
      animation: pour 5s ease-in-out both;
    }
    .kettle {
      position: absolute;
      left: 25%;
      top: 8%;
      width: 27%;
      height: 17%;
      border-radius: 50% 50% 44% 44%;
      background: linear-gradient(120deg, #6a5b4c, #d8c8b3 42%, #42382f 100%);
      transform: rotate(-8deg);
      opacity: 0.9;
    }
    .steam span {
      position: absolute;
      left: calc(47% + var(--x));
      top: 28%;
      width: 6%;
      height: 34%;
      border-left: 2px solid rgba(255,255,255,0.28);
      border-radius: 50%;
      filter: blur(1px);
      animation: steam 5s ease-in-out both;
      animation-delay: var(--d);
    }
    .cta {
      position: absolute;
      right: 7%;
      bottom: 9%;
      color: #f5ecdf;
      font-size: 18px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      mix-blend-mode: screen;
      animation: title 5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes pour {
      0%, 9% { opacity: 0; transform: rotate(3deg) scaleY(0.35); }
      18%, 86% { opacity: 1; transform: rotate(7deg) scaleY(1); }
      100% { opacity: 0; transform: rotate(9deg) scaleY(0.15); }
    }
    @keyframes steam {
      0% { opacity: 0; transform: translateY(22px) scale(0.82); }
      20%, 72% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-44px) scale(1.14); }
    }
    @keyframes breathe {
      0% { transform: scale(0.985); }
      50% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    @keyframes title {
      0%, 62% { opacity: 0; transform: translateY(10px); }
      76%, 100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="counter"></div>
  <div class="cloth"></div>
  <div class="kettle"></div>
  <div class="pour"></div>
  <div class="carafe"></div>
  <div class="steam">
    <span style="--x:-16px; --d:0s"></span>
    <span style="--x:10px; --d:.35s"></span>
    <span style="--x:28px; --d:.72s"></span>
  </div>
  <div class="cta">Pour better</div>
</body>
</html>
