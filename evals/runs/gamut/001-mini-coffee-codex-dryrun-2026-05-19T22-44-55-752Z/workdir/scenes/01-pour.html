<!doctype html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #17110d;
    font-family: Georgia, "Times New Roman", serif;
    color: #f6f0e7;
  }
  .table {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 95px;
    background: #2a1d15;
  }
  .carafe {
    position: absolute;
    left: 280px;
    top: 105px;
    width: 80px;
    height: 105px;
    background: #f1ede4;
    border-radius: 0 0 17px 17px;
  }
  .coffee {
    position: absolute;
    left: 298px;
    top: 133px;
    width: 44px;
    height: 52px;
    background: #4b2c1d;
  }
  .dripper {
    position: absolute;
    left: 274px;
    top: 63px;
    width: 92px;
    height: 46px;
    background: #ded7ca;
    clip-path: polygon(10% 0, 90% 0, 66% 100%, 34% 100%);
  }
  .stream {
    position: absolute;
    left: 319px;
    top: 36px;
    width: 3px;
    height: 68px;
    background: #c9b28e;
  }
  .steam {
    position: absolute;
    left: 305px;
    top: 56px;
    width: 36px;
    height: 36px;
    border: 2px solid #f6f0e7;
    border-left: 0;
    border-bottom: 0;
    border-radius: 50%;
    opacity: 0.34;
  }
  .copy {
    position: absolute;
    right: 48px;
    bottom: 36px;
    text-align: right;
  }
  .line {
    font: 10px/1.5 Optima, "Avenir Next", Arial, sans-serif;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.78;
  }
  h1 {
    margin: 9px 0 0;
    font-weight: 400;
    font-size: 34px;
    line-height: 0.95;
    letter-spacing: 0;
  }
</style>
</head>
<body>
  <div class="table"></div>
  <div class="stream"></div>
  <div class="steam"></div>
  <div class="dripper"></div>
  <div class="carafe"></div>
  <div class="coffee"></div>
  <div class="copy">
    <div class="line">hand-poured<br>hand-watched</div>
    <h1>Pour<br>better</h1>
  </div>
</body>
</html>
