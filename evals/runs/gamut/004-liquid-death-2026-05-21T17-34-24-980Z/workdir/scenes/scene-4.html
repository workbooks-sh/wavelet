<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  .stage { position: absolute; inset: 0; background: #050505; }
  .counter {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 40% 30% at 30% 68%, rgba(255, 145, 60, 0.40) 0%, rgba(255,120,40,0.10) 35%, transparent 65%),
      radial-gradient(ellipse 80% 70% at 50% 100%, #141414 10%, #050505 60%),
      #050505;
  }
  .wet-ring {
    position: absolute;
    left: 50%; top: 60%;
    transform: translate(-50%, -50%);
    width: 38%;
    aspect-ratio: 1.6 / 1;
    border: 3px solid rgba(255, 165, 90, 0.36);
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(255, 165, 90, 0.55) 0%, rgba(255, 120, 40, 0.18) 18%, transparent 35%),
      radial-gradient(ellipse at center, rgba(20,12,8,0.65) 20%, rgba(8,5,3,0.4) 60%, transparent 100%);
    box-shadow:
      inset 0 0 30px rgba(255, 165, 90, 0.18),
      0 0 80px rgba(255, 120, 40, 0.12);
    filter: blur(1px);
    animation: ring-flicker 1.2s ease-in-out infinite alternate;
  }
  @keyframes ring-flicker {
    0%   { box-shadow: inset 0 0 30px rgba(255, 165, 90, 0.18), 0 0 80px rgba(255, 120, 40, 0.12); }
    50%  { box-shadow: inset 0 0 38px rgba(255, 165, 90, 0.26), 0 0 100px rgba(255, 120, 40, 0.18); }
    100% { box-shadow: inset 0 0 28px rgba(255, 165, 90, 0.16), 0 0 70px rgba(255, 120, 40, 0.10); }
  }
  .candle-reflection {
    position: absolute;
    left: 38%; top: 56%;
    width: 28px; height: 36px;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(255, 215, 130, 1.0) 0%, rgba(255, 150, 60, 0.85) 40%, rgba(180, 60, 20, 0.0) 80%);
    filter: blur(1.5px);
    border-radius: 40% 40% 50% 50% / 60% 60% 40% 40%;
    transform-origin: bottom center;
    animation: flame-flicker 0.18s ease-in-out infinite alternate;
  }
  @keyframes flame-flicker {
    0%   { transform: scale(1.0, 1.0) translate(0, 0); opacity: 0.95; }
    50%  { transform: scale(1.05, 0.94) translate(-1px, 1px); opacity: 1.0; }
    100% { transform: scale(0.96, 1.08) translate(1px, -1px); opacity: 0.88; }
  }
  .product-far {
    position: absolute;
    left: 50%; top: 18%;
    transform: translateX(-50%) scale(0.55);
    width: 35%;
    aspect-ratio: 800 / 1035;
    opacity: 0;
    filter:
      brightness(0.50)
      blur(6px)
      drop-shadow(0 20px 30px rgba(0,0,0,0.9));
    animation: focus-pull 2.4s cubic-bezier(0.2, 0.0, 0.5, 1.0) forwards;
  }
  .product-far img {
    width: 100%; height: 100%; object-fit: contain;
  }
  @keyframes focus-pull {
    0%   { opacity: 0; filter: brightness(0.45) blur(6px); }
    35%  { opacity: 0.20; filter: brightness(0.50) blur(5px); }
    100% { opacity: 0.55; filter: brightness(0.62) blur(2px); }
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 70% at 50% 55%, transparent 30%, rgba(0,0,0,0.75) 100%);
  }
  .grain {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.022), transparent 60%),
      radial-gradient(circle at 70% 70%, rgba(255,255,255,0.015), transparent 60%);
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="counter"></div>
    <div class="product-far"><img src="../product.png" alt="Liquid Death Mountain Water"/></div>
    <div class="wet-ring"></div>
    <div class="candle-reflection"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>
</body>
</html>
