<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  .stage { position: absolute; inset: 0; }
  .plate {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.78) saturate(0.88);
  }
  .ambient-scrim {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 45% at 18% 60%, rgba(255, 130, 40, 0.22) 0%, transparent 60%),
      radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.7) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 25%, transparent 70%, rgba(0,0,0,0.6) 100%);
  }
  .product-wrap {
    position: absolute;
    left: 50%;
    bottom: -8%;
    transform: translateX(-50%);
    width: 56%;
    aspect-ratio: 800 / 1035;
    animation: lift-out 2.4s cubic-bezier(0.4, 0.0, 0.3, 1.0) forwards;
  }
  .product-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    filter:
      brightness(0.82)
      contrast(1.06)
      drop-shadow(0 40px 50px rgba(0,0,0,0.88))
      drop-shadow(-40px 0px 70px rgba(255, 120, 30, 0.22));
  }
  @keyframes lift-out {
    0%   { bottom: -8%; }
    100% { bottom: 60%; }
  }
  .candle-warmth {
    position: absolute; left: 4%; top: 50%;
    width: 30%; height: 30%;
    background: radial-gradient(circle, rgba(255, 150, 60, 0.38) 0%, transparent 60%);
    filter: blur(30px);
    animation: candle-flicker 0.9s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes candle-flicker {
    0%   { opacity: 0.78; transform: translate(0, 0) scale(1.00); }
    33%  { opacity: 1.00; transform: translate(-3px, -1px) scale(1.05); }
    66%  { opacity: 0.72; transform: translate(2px, 2px) scale(0.97); }
    100% { opacity: 0.92; transform: translate(0, -3px) scale(1.02); }
  }
  .grain {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 31% 22%, rgba(255,255,255,0.018), transparent 60%),
      radial-gradient(circle at 71% 71%, rgba(255,255,255,0.014), transparent 60%);
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
  <div class="stage">
    <video class="plate" src="../shots/shot-3.mp4" autoplay muted playsinline></video>
    <div class="ambient-scrim"></div>
    <div class="candle-warmth"></div>
    <div class="product-wrap"><img src="../product.png" alt="Liquid Death Mountain Water"/></div>
    <div class="grain"></div>
  </div>
</body>
</html>
