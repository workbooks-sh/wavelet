<!doctype html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  .stage { position: absolute; inset: 0; }
  .plate {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.78) saturate(0.9);
  }
  .ambient-scrim {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 45% at 18% 60%, rgba(255, 130, 40, 0.22) 0%, transparent 60%),
      radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.7) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 25%, transparent 65%, rgba(0,0,0,0.55) 100%);
  }
  .product-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1.0);
    width: 52%;
    aspect-ratio: 800 / 1035;
    animation: push-in 2.4s cubic-bezier(0.33, 0.0, 0.4, 1.0) forwards, handheld-jitter 0.8s ease-in-out infinite alternate;
  }
  .product-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    filter:
      brightness(0.82)
      contrast(1.06)
      drop-shadow(0 40px 50px rgba(0,0,0,0.88))
      drop-shadow(-40px 0px 70px rgba(255, 120, 30, 0.22));
  }
  @keyframes push-in {
    0%   { transform: translate(-50%, -50%) scale(0.92); }
    100% { transform: translate(-50%, -50%) scale(1.16); }
  }
  @keyframes handheld-jitter {
    0%   { filter: brightness(0.82) contrast(1.06) drop-shadow(0 40px 50px rgba(0,0,0,0.88)) drop-shadow(-40px 0px 70px rgba(255, 120, 30, 0.22)); }
    100% { filter: brightness(0.84) contrast(1.05) drop-shadow(2px 42px 50px rgba(0,0,0,0.88)) drop-shadow(-42px -1px 70px rgba(255, 120, 30, 0.24)); }
  }
  .candle-warmth {
    position: absolute; left: 4%; top: 50%;
    width: 30%; height: 30%;
    background: radial-gradient(circle, rgba(255, 150, 60, 0.38) 0%, transparent 60%);
    filter: blur(30px);
    animation: candle-flicker 0.9s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes candle-flicker {
    0%   { opacity: 0.78; transform: translate(0, 0) scale(1.00); }
    33%  { opacity: 1.00; transform: translate(-3px, -1px) scale(1.05); }
    66%  { opacity: 0.72; transform: translate(2px, 2px) scale(0.97); }
    100% { opacity: 0.92; transform: translate(0, -3px) scale(1.02); }
  }
  .condensation-bead {
    position: absolute;
    left: 52%;
    top: 36%;
    width: 8px;
    height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
    animation: bead-fall 2.4s 0.4s cubic-bezier(0.6, 0.0, 1.0, 1.0) forwards;
    opacity: 0;
  }
  @keyframes bead-fall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: 0.95; }
    100% { transform: translateY(140px); opacity: 0.85; }
  }
  .grain {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 35% 25%, rgba(255,255,255,0.018), transparent 60%),
      radial-gradient(circle at 65% 75%, rgba(255,255,255,0.014), transparent 60%);
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
  <div class="stage">
    <video class="plate" src="../shots/shot-2.mp4" autoplay muted playsinline></video>
    <div class="ambient-scrim"></div>
    <div class="candle-warmth"></div>
    <div class="product-wrap"><img src="../product.png" alt="Liquid Death Mountain Water"/></div>
    <div class="condensation-bead"></div>
    <div class="grain"></div>
  </div>
</body>
</html>
